name: Tests, Quality Checks, and Vercel Deployment 

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    environment: Preview

    env:
      NODE_ENV: "test"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_WEBHOOK_SIGNING_SECRET: ${{ secrets.CLERK_WEBHOOK_SIGNING_SECRET }}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
      BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
      GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      GEOSCAPE_API_KEY: ${{ secrets.GEOSCAPE_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      BUSINESS_EMAIL: "info@royalconstructions.com.au"
      GRAPH_SENDER_UPN: "Dhrub@royalconstructions.com.au"

      GRAPH_MODE: "app-only"
      WEBHOOK_PATH: "/api/graph/notifications"
      WEBHOOK_PORT: "3000"
      GRAPH_WEBHOOK_CLIENT_STATE: "royal-leadgen-webhook"
      GRAPH_NOTIFICATION_URL: ${{ secrets.GRAPH_NOTIFICATION_URL }}
      GRAPH_SUBSCRIPTION_EXPIRATION_MINUTES: "60"

      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PNPM
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma generate
        run: pnpm prisma:generate

      - name: Run lint
        run: pnpm lint
        continue-on-error: true

      - name: Run typecheck
        run: pnpm typecheck

      - name: Build project
        run: pnpm build:webpack

      # Install Vercel CLI only on main branch
      - name: Install Vercel CLI
        if: github.ref == 'refs/heads/main'
        run: pnpm add -g vercel

      # Pull Vercel environment/project settings
      - name: Pull Vercel Environment Information
        if: github.ref == 'refs/heads/main'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Pull Vercel environment/project settings for staging
      - name: Pull Preview Environment
        if: github.ref == 'refs/heads/staging'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      # Build using Vercel
      - name: Build Vercel Project
        if: github.ref == 'refs/heads/main'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      
      # Build using Vercel for staging
      - name: Build Vercel Project for Staging
        if: github.ref == 'refs/heads/staging'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      # Deploy prebuilt output
      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Deploy prebuilt output for staging
      - name: Deploy to Vercel for Staging
        if: github.ref == 'refs/heads/staging'
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}