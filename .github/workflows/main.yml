name: Tests, Quality Checks, and Vercel Deployment

on:
  push:
    branches:
      - "**"
  pull_request:

# ─── Shared env vars (referenced in all jobs) ────────────────────────────────
env:
  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
  CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
  CLERK_WEBHOOK_SIGNING_SECRET: ${{ secrets.CLERK_WEBHOOK_SIGNING_SECRET }}
  NEXT_PUBLIC_CLERK_SIGN_IN_URL: "/sign-in"
  NEXT_PUBLIC_CLERK_SIGN_UP_URL: "/sign-up"
  BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
  GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
  GEOSCAPE_API_KEY: ${{ secrets.GEOSCAPE_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  BUSINESS_EMAIL: "info@royalconstructions.com.au"
  GRAPH_SENDER_UPN: "Dhrub@royalconstructions.com.au"
  GRAPH_MODE: "app-only"
  WEBHOOK_PATH: "/api/graph/notifications"
  WEBHOOK_PORT: "3000"
  GRAPH_WEBHOOK_CLIENT_STATE: "royal-leadgen-webhook"
  GRAPH_NOTIFICATION_URL: ${{ secrets.GRAPH_NOTIFICATION_URL }}
  GRAPH_SUBSCRIPTION_EXPIRATION_MINUTES: "60"
  NEXT_PUBLIC_NOVU_APP_IDENTIFIER: ${{ secrets.NEXT_PUBLIC_NOVU_APP_IDENTIFIER }}
  NOVU_SECRET_KEY: ${{ secrets.NOVU_SECRET_KEY }}
  MISTRAL_AI_KEY: ${{ secrets.MISTRAL_AI_KEY }}

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    environment: Preview

    env:
      NODE_ENV: "test"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PNPM
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm                          # caches the pnpm store
          cache-dependency-path: pnpm-lock.yaml

      # NEW: Cache Next.js build output (.next/cache)
      # Key rotates when lockfile OR any source file changes.
      # Falls back to a lockfile-only key so a prior build cache is reused
      # when only source files changed.
      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts','**/*.tsx','**/*.js','**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma generate
        run: pnpm prisma:generate

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Build project
        run: pnpm build:webpack

  vercel-deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: quality-checks
    environment: Preview

    env:
      DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PNPM
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      # Install dependencies without cache (since we cached node_modules in quality-checks)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile    # store is cached, only symlinks created
      
      # NEW: Restore Next.js build cache for Vercel build step
      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts','**/*.tsx','**/*.js','**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Run Prisma migrate
        run: pnpm prisma:migrate-deploy

      - name: Run Prisma generate
        run: pnpm prisma:generate

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  vercel-deploy-staging:
    if: github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    needs: quality-checks
    environment: Preview

    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup PNPM
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      # Install dependencies without cache (since we cached node_modules in quality-checks)
      - name: Install dependencies
        run: pnpm install --frozen-lockfile    # store is cached, only symlinks created

      # NEW: Restore Next.js build cache
      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.ts','**/*.tsx','**/*.js','**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Run Prisma migrate
        run: pnpm prisma:migrate-deploy

      - name: Run Prisma generate
        run: pnpm prisma:generate

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Pull Preview Environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Vercel Project for Staging
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel for Staging
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}